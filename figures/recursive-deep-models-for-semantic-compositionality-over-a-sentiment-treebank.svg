<?xml version="1.0" standalone="no"?><!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd"><svg style="width: 958px; height: 400px;" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><defs xmlns="http://www.w3.org/1999/xhtml"><style type="text/css"><![CDATA[
body, div, table, tr, td, p { margin: 0px; padding: 0px; border: 0px; }
table { border-collapse: collapse; }
body { background: rgb(255, 255, 255); }
div#OuterCanvas { width: 100%; cursor: default; }
div#InnerCanvas { margin: 0px 25px; text-align: center; }
div#Page { display: inline-block; text-align: left; min-height: 400px; margin: 30px auto 50px; border: 1px solid rgb(204, 204, 204); border-top-right-radius: 50px; border-bottom-left-radius: 80px; box-shadow: rgb(187, 187, 187) 0px 0px 24px; color: rgb(102, 102, 102); font-family: NeutraLight, "Gill Sans", "Sans Serif"; font-size: 10pt; background: rgb(238, 238, 238); }
div#Page i { font-family: NeutraLightItalic; font-style: normal; }
div#Page b { font-family: NeutraBold; font-weight: normal; }
div.header { padding: 25px 15px 20px 25px; border-bottom-width: 1px; border-bottom-style: solid; border-bottom-color: rgb(221, 221, 221); border-top-right-radius: 50px; color: rgb(102, 102, 102); font-family: NeutraLight; font-size: 10pt; background: rgb(255, 255, 255); }
div.header span.title { display: inline-block; padding: 0px 15px 0px 10px; color: rgb(51, 51, 51); font-family: Georgia, "Times New Roman", serif; font-size: 1.8em; font-weight: bold; }
div.header span.subtitle { display: inline-block; padding: 0px 10px; }
div.header span.selected { font-family: NeutraBold; color: rgb(51, 51, 51); }
div.header span.disabled { color: rgb(187, 187, 187); }
div.header a { color: rgb(102, 102, 102); text-decoration: none; }
div.header a:hover { color: rgb(153, 51, 51); text-decoration: underline; }
div.content { padding: 20px 50px; }
div.content p { margin: 0px 50px 1em 20px; }
div.content a { color: rgb(153, 51, 51); font-family: NeutraLight; text-decoration: none; }
div.content a:hover { text-decoration: underline; }
div.content p.intro { color: rgb(51, 51, 51); font-size: 12pt; word-spacing: 1px; line-height: 1.2em; padding-left: 20px; padding-right: 40px; }
div.content p.footnote { font-size: 8pt; color: rgb(102, 102, 102); }
div.content sup.footnote { font-size: 9pt; color: rgb(153, 153, 153); height: 0px; line-height: 0; position: relative; }
div.content p.disabled { color: rgb(187, 187, 187); }
div.content p.reference { width: 240px; margin: 0px 0px 1em 25px; }
div.content p.reference span.name { white-space: nowrap; }
div.content p.reference img { border: 1px solid rgb(238, 238, 238); }
div.footer { height: 40px; padding: 20px 30px 20px 120px; border-top-width: 1px; border-top-style: solid; border-top-color: rgb(204, 204, 204); text-align: right; vertical-align: bottom; color: rgb(153, 153, 153); }
div.footer span { display: inline-block; }
div.footer .info { display: none; }
div.footer a { color: rgb(153, 153, 153); text-decoration: none; }
div.footer a:hover { color: rgb(153, 51, 51); text-decoration: underline; }
div.ControlInfo { padding: 10px 0px; }
div.ControlPanel { padding: 10px 0px; }
div.SimpleSentree { display: inline-block; width: 200px; height: 212px; margin: 10px 0px 0px 10px; vertical-align: top; cursor: pointer; }
div.SimpleSentree div.header { width: 170px; height: 12px; border: 1px solid rgb(187, 187, 187); border-top-right-radius: 10px; border-top-left-radius: 10px; color: rgb(255, 255, 255); padding: 0px 15px; text-align: center; vertical-align: bottom; font-family: Verdana; font-weight: bold; font-size: 10px; background: rgb(187, 187, 187); }
div.SimpleSentree div.body { width: 200px; height: 200px; border: 1px solid rgb(187, 187, 187); border-bottom-right-radius: 10px; border-bottom-left-radius: 10px; background: rgb(255, 255, 255); }
div.FullSentree { display: inline-block; margin: 10px 0px 0px 10px; vertical-align: top; border-radius: 16px; box-shadow: rgb(0, 0, 0) 0px 0px 50px; cursor: pointer; }
div.FullSentree div.header { height: 14px; border: 1px solid rgb(153, 153, 153); border-top-right-radius: 15px; border-top-left-radius: 15px; color: rgb(238, 238, 238); padding: 5px 15px; text-align: center; vertical-align: bottom; font-family: Verdana; font-weight: bold; font-size: 12px; background: rgb(153, 153, 153); }
div.FullSentree div.body { border: 1px solid rgb(153, 153, 153); border-bottom-right-radius: 15px; border-bottom-left-radius: 15px; background: rgb(255, 255, 255); }
div.content p.description { color: rgb(51, 51, 51); font-size: 11pt; word-spacing: 1px; line-height: 1.2em; padding-left: 20px; padding-right: 20px; }
div.content p.querybox { color: rgb(51, 51, 51); font-size: 13pt; word-spacing: 1px; line-height: 1.2em; padding-left: 10px; padding-right: 10px; }
div.content h3 { display: inline-block; padding: 0px 10px; color: rgb(51, 51, 51); font-family: Georgia, "Times New Roman", serif; font-size: 1.2em; font-weight: bold; }
div.content p.inlinetitle { display: inline; padding: 0px 20px; color: rgb(51, 51, 51); font-family: Georgia, "Times New Roman", serif; font-size: 1.1em; font-weight: bold; }
div.content p.inlinebody { display: inline-block; color: rgb(51, 51, 51); font-size: 11pt; word-spacing: 1px; line-height: 1.2em; padding-left: 10px; padding-right: 10px; }
div.trees { padding: 10px; }
div.tree { display: inline-block; border: 1px solid rgb(170, 170, 170); padding: 10px; margin: 0px; background: rgb(255, 255, 255); }
div.tooltip { position: absolute; text-align: left; width: 186px; height: auto; padding: 15px; font-style: normal; font-variant: normal; font-weight: normal; font-stretch: normal; font-size: 12px; line-height: normal; font-family: sans-serif; border-radius: 8px; pointer-events: none; box-shadow: rgba(0, 0, 0, 0.45098) 0px 5px 20px; background: seashell; }
div.scoring { text-align: left; height: auto; font-family: Verdana; font-size: 11pt; margin-left: 0px; margin-right: 0px; margin-top: 0px; color: rgb(51, 51, 51); background-image: none; background-color: transparent; }
.spacingFree { padding: 0px; margin: 0px; }
.scoreOne { color: rgb(178, 24, 43); }
.scoreTwo { color: rgb(244, 165, 130); }
.scoreThree { color: rgb(153, 153, 153); }
.scoreFour { color: rgb(146, 197, 222); }
.scoreFive { color: rgb(33, 102, 172); }
.link { fill: none; stroke: rgb(204, 204, 204); stroke-width: 1.5px; }
.btn { display: inline-block; padding: 4px 12px; margin-bottom: 0px; margin-right: 0.3em; font-size: 14px; line-height: 20px; color: rgb(51, 51, 51); text-align: center; vertical-align: middle; cursor: pointer; border-width: 1px; border-style: solid; border-color: rgba(0, 0, 0, 0.0980392) rgba(0, 0, 0, 0.0980392) rgb(153, 153, 153); }
.btn:hover { text-decoration: none; }
.btn:active { text-decoration: none; }
.btn.btn-next { background-color: rgb(52, 152, 219); }
.btn.btn-next:hover, .btn.btn-next:focus, .btn-group:focus .btn.btn-next.dropdown-toggle { background-color: rgb(93, 173, 226); }
.btn.btn-next:active, .btn-group.open .btn.btn-next.dropdown-toggle, .btn.btn-next.active { background-color: rgb(44, 129, 186); }
.btn.btn-thanks { background-color: rgb(204, 204, 204); }
div.parserOutput { padding-left: 3em; padding-top: 1em; padding-bottom: 0px; margin: 0px; }
div.parserOutputMonospace { padding-top: 1em; padding-bottom: 1em; margin: 0px; font-family: monospace; padding-left: 3em; }
div.controls { font-family: Verdana; font-size: 8pt; color: rgb(238, 238, 238); padding: 10px; border-bottom-width: 1px; border-bottom-style: solid; border-bottom-color: rgb(102, 102, 102); background: rgb(136, 136, 136); }
div.controls input[type="text"] { border: 1px solid rgb(170, 170, 170); padding: 2px 5px; width: 40px; text-align: right; }
div.content p { margin: 0px 20px 1em; }
div.content p.intro { padding-right: 20px; }]]></style></defs><g style="width: 958px; height: 400px;"><line class="link" x1="392.1725" y1="61.71428571428571" x2="88.56" y2="101.42857142857142" stroke="rgb(0,0,0)" stroke-width="1" stroke-opacity="0.5"/><line class="link" x1="392.1725" y1="61.71428571428571" x2="695.785" y2="101.42857142857142" stroke="rgb(0,0,0)" stroke-width="1" stroke-opacity="0.5"/><circle class="node nodeCirc node_1" cx="392.1725" cy="55.71428571428571" r="10" stroke="rgb(0,0,0)" stroke-width="0.5" fill="#f4a582" style="cursor: pointer;"/><text class="node nodeLabel node_1" x="392.1725" y="58.71428571428571" stroke-width="0" fill="#9d5839" font-family="Verdana" font-size="6pt" text-anchor="middle" style="cursor: pointer;">−</text><circle class="node nodeCirc node_2" cx="88.56" cy="111.42857142857142" r="10" stroke="rgb(0,0,0)" stroke-width="0.5" fill="#f7f7f7" style="cursor: pointer;"/><text class="node nodeLabel node_2" x="88.56" y="114.42857142857142" stroke-width="0" fill="#8c8c8c" font-family="Verdana" font-size="6pt" text-anchor="middle" style="cursor: pointer;">0</text><line class="link" x1="695.785" y1="117.42857142857142" x2="472.19" y2="157.14285714285714" stroke="rgb(0,0,0)" stroke-width="1" stroke-opacity="0.5"/><line class="link" x1="695.785" y1="117.42857142857142" x2="919.38" y2="157.14285714285714" stroke="rgb(0,0,0)" stroke-width="1" stroke-opacity="0.5"/><circle class="node nodeCirc node_3" cx="695.785" cy="111.42857142857142" r="10" stroke="rgb(0,0,0)" stroke-width="0.5" fill="#f4a582" style="cursor: pointer;"/><text class="node nodeLabel node_3" x="695.785" y="114.42857142857142" stroke-width="0" fill="#9d5839" font-family="Verdana" font-size="6pt" text-anchor="middle" style="cursor: pointer;">−</text><line class="link" x1="472.19" y1="173.14285714285714" x2="281.51000000000005" y2="212.85714285714283" stroke="rgb(0,0,0)" stroke-width="1" stroke-opacity="0.5"/><line class="link" x1="472.19" y1="173.14285714285714" x2="662.87" y